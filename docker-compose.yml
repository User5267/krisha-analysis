services:
  clickhouse:
    image: clickhouse/clickhouse-server:24.3
    container_name: clickhouse
    restart: always
    ports:
      - "8123:8123"
      - "9000:9000"
    environment:
      CLICKHOUSE_USER: admin
      CLICKHOUSE_PASSWORD: admin123
      CLICKHOUSE_DB: dwh
    volumes:
      - clickhouse-data:/var/lib/clickhouse
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8123/ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  postgres:
    image: postgres:15
    container_name: airflow-postgres
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - postgres-data:/var/lib/postgresql/data

  airflow-init:
    image: apache/airflow:2.9.1
    container_name: airflow-init
    depends_on:
      - postgres
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    volumes:
      - ./dags:/opt/airflow/dags
    command: >
      bash -c "airflow db migrate &&
               airflow users create --username admin --password admin123
               --firstname Admin --lastname User
               --role Admin --email admin@example.com"

  airflow-webserver:
    image: apache/airflow:2.9.1
    container_name: airflow-webserver
    restart: always
    depends_on:
      - postgres
      - airflow-init
    ports:
      - "8080:8080"
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__WEBSERVER__SECRET_KEY: "mysecretkey"
    volumes:
      - ./dags:/opt/airflow/dags
      - ./logs:/opt/airflow/logs
      - ./my_dwh_project:/opt/airflow/dbt/my_dwh_project
      - ./data:/opt/airflow/krisha_data
    command: airflow webserver

  airflow-scheduler:
    image: apache/airflow:2.9.1
    container_name: airflow-scheduler
    restart: always
    depends_on:
      - postgres
      - airflow-init
      - clickhouse  # ← scheduler стартует после CH
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__WEBSERVER__SECRET_KEY: "mysecretkey"
    volumes:
      - ./dags:/opt/airflow/dags
      - ./logs:/opt/airflow/logs
      - ./my_dwh_project:/opt/airflow/dbt/my_dwh_project
      - ./data:/opt/airflow/krisha_data

    command: >
      bash -c "pip install dbt-clickhouse clickhouse-driver && airflow scheduler"
      #                                    ↑ clickhouse-driver нужен для загрузки CSV

  # ── Парсер Krisha ─────────────────────────────────────────────────────────
  # Не запускается при обычном `docker compose up` (profile=manual).
  # Запуск вручную для теста:
  #   docker compose --profile manual run --rm krisha-parser --max-pages 5
  krisha-parser:
    build:
      context: ./krisha_parser
      dockerfile: Dockerfile
    image: krisha-parser:latest
    profiles:
      - manual
    volumes:
      - ./data:/data    # ← папка на хосте вместо volume
    environment:
      PYTHONUNBUFFERED: "1"
    command: ["--output-dir", "/data", "--max-pages", "50", "--delay", "2.0"]


  metabase:
    image: metabase/metabase:latest
    container_name: metabase
    hostname: metabase
    volumes:
      - metabase-data:/metabase-data
    ports:
      - 3000:3000
    environment:
      MB_DB_TYPE: h2
      MB_DB_FILE: /metabase-data/metabase.db
    healthcheck:
      test: curl --fail -I http://localhost:3000/api/health || exit 1
      interval: 15s
      timeout: 5s
      retries: 5

volumes:
  clickhouse-data:
  postgres-data:
  krisha-data:  # ← общий volume: парсер пишет, Airflow читает
  metabase-data:

